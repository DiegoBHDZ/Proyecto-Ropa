# --- CONEXIÓN BASE DE DATOS ---
spring.application.name=ropa-api

spring.datasource.url=jdbc:mysql://localhost:3306/ropa_shop_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC

spring.datasource.username=ropa_dev
spring.datasource.password=ropa_pass

# driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- COMPORTAMIENTO JPA (Hibernate) ---
# Update: Crea las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL en la consola 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect