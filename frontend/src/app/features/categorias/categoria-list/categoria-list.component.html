<div class="p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="text-white fw-bold mb-0">
      <i class="bi bi-grid me-2" style="color:#8b5cf6"></i>Categorías
    </h4>
    <button class="btn btn-danger btn-sm" (click)="showForm.set(!showForm())">
      <i class="bi {{ showForm() ? 'bi-x' : 'bi-plus-circle' }} me-1"></i>
      {{ showForm() ? 'Cancelar' : 'Nueva Categoría' }}
    </button>
  </div>

  @if (showForm()) {
    <div class="mb-4">
      <app-categoria-form (saved)="onSaved()" (cancelled)="showForm.set(false)" />
    </div>
  }

  @if (loading()) {
    <div class="text-center py-5">
      <div class="spinner-border text-secondary"></div>
    </div>
  } @else if (categorias().length === 0) {
    <div class="jdm-card text-center py-5">
      <i class="bi bi-grid-x fs-1 text-secondary"></i>
      <p class="text-secondary mt-2">Sin categorías registradas</p>
    </div>
  } @else {
    <div class="row g-3">
      @for (cat of categorias(); track cat.id) {
        <div class="col-12 col-md-6 col-lg-4">
          <div class="jdm-card p-4">
            <div class="d-flex align-items-start gap-3">
              <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                   style="width:42px;height:42px;background:rgba(139,92,246,0.15)">
                <i class="bi bi-grid-fill" style="color:#8b5cf6"></i>
              </div>
              <div>
                <h6 class="text-white fw-semibold mb-1">{{ cat.nombre }}</h6>
                <small class="text-secondary">{{ cat.descripcion || 'Sin descripción' }}</small>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  }
</div>
